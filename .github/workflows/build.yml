# Build workflow for LineageOS 16.0 suez
name: Build LineageOS 16.0 - Amazon Fire HD 10 (suez)

on:
  workflow_dispatch:
  push:
    branches: ['main', 'copilot/**']

env:
  BUILD_DIR: /mnt/lineage
  CCACHE_DIR: /mnt/ccache

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 330

    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 4096
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        build-mount-path: /mnt

    - name: Report available disk / memory
      run: |
        df -h /mnt /
        free -h

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          git-core gnupg flex bison gperf build-essential zip curl \
          zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev \
          lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
          fontconfig python3 python-is-python3 ccache openjdk-8-jdk \
          bc rsync libssl-dev schedtool lzop

    - name: Set Java 8 as default
      run: |
        sudo update-alternatives --set java \
          /usr/lib/jvm/java-8-openjdk-amd64/bin/java
        sudo update-alternatives --set javac \
          /usr/lib/jvm/java-8-openjdk-amd64/bin/javac
        java -version

    - name: Set up repo tool
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo \
          > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Configure git
      run: |
        git config --global user.email "build@github.actions"
        git config --global user.name "GitHub Actions"
        git config --global color.ui false
        git config --global advice.detachedHead false

    - name: Initialize LineageOS 16.0 manifest
      run: |
        mkdir -p $BUILD_DIR
        cd $BUILD_DIR
        ~/bin/repo init \
          -u https://github.com/LineageOS/android.git \
          -b lineage-16.0 \
          --depth=1 \
          --no-repo-verify \
          --no-clone-bundle

    - name: Add local manifest (device + kernel + vendor)
      run: |
        mkdir -p $BUILD_DIR/.repo/local_manifests
        {
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<manifest>' \
            '  <project name="lineage16-suez/device_amazon_suez"' \
            '           path="device/amazon/suez"' \
            '           remote="github"' \
            '           revision="lineage-16.0" />' \
            '  <project name="lineage16-suez/kernel_amazon_suez"' \
            '           path="kernel/amazon/mt8173/suez"' \
            '           remote="github"' \
            '           revision="lineage-16.0" />' \
            '  <project name="ivanlopezmolina/vendor_amazon_suez"' \
            '           path="vendor/amazon/suez"' \
            '           remote="github"' \
            '           revision="main" />' \
            '</manifest>'
        } > $BUILD_DIR/.repo/local_manifests/roomservice.xml

    - name: Sync source tree
      run: |
        cd $BUILD_DIR
        ~/bin/repo sync \
          -c \
          --no-tags \
          --no-clone-bundle \
          --force-sync \
          -j4 \
          2>&1 | grep -v "^$" | tail -200

    - name: Report disk after sync
      run: df -h /mnt && du -sh $BUILD_DIR

    - name: Apply external/v8 Android.bp fix
      run: |
        FIX_SCRIPT=$(mktemp)
        {
          printf '%s\n' \
            "from pathlib import Path" \
            "" \
            "f = Path('/mnt/lineage/external/v8/Android.bp')" \
            "content = f.read_text()" \
            "" \
            "old = '// host_ldlibs: [\"-ldl\"],\\n    \"'" \
            "new = '// host_ldlibs: [\"-ldl\"],\\n    srcs: [\\n    \"'" \
            "" \
            "torque_start = content.find('cc_binary_host {')" \
            "while torque_start != -1:" \
            "    block_end = content.find('\\n}', torque_start) + 2" \
            "    block = content[torque_start:block_end]" \
            "    if 'v8_torque' in block and 'srcs: [' not in block:" \
            "        content = content[:torque_start] + block.replace(old, new, 1) + content[block_end:]" \
            "        print('v8 Android.bp fix applied')" \
            "        break" \
            "    torque_start = content.find('cc_binary_host {', torque_start + 1)" \
            "else:" \
            "    print('v8 fix not needed or already applied')" \
            "" \
            "f.write_text(content)"
        } > "$FIX_SCRIPT"
        python3 "$FIX_SCRIPT"
        rm -f "$FIX_SCRIPT"

    - name: Create CTS stub (not synced in device-only builds)
      run: |
        mkdir -p $BUILD_DIR/cts
        echo '# Stub - cts not synced, device build only' \
          > $BUILD_DIR/cts/error_prone_rules.mk

    - name: Configure ccache
      run: |
        mkdir -p $CCACHE_DIR
        ccache -M 15G
        ccache -s

    - name: Build LineageOS (mka bacon)
      env:
        ALLOW_MISSING_DEPENDENCIES: "true"
        USE_CCACHE: "1"
        CCACHE_EXEC: /usr/bin/ccache
        LANG: C.UTF-8
        LC_ALL: C.UTF-8
      run: |
        cd $BUILD_DIR
        source build/envsetup.sh
        lunch lineage_suez-userdebug
        export JACK_SERVER_VM_ARGUMENTS="-Dfile.encoding=UTF-8 -XX:+TieredCompilation -Xmx4g"
        export ANDROID_JACK_VM_ARGS="-Dfile.encoding=UTF-8 -XX:+TieredCompilation -Xmx4g"
        mka bacon -j2

    - name: Build summary
      if: always()
      run: |
        echo "=== Disk usage ==="
        df -h /mnt /
        echo "=== Output files ==="
        ls -lh $BUILD_DIR/out/target/product/suez/ 2>/dev/null \
          || echo "No output directory"

    - name: Upload ROM ZIP
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: lineage-16.0-suez
        path: /mnt/lineage/out/target/product/suez/lineage-*.zip
        retention-days: 7
